id: stale-vs-recent
scenarioVersion: 2
name: Recency 2024 vs 2026
description: Prefer recent groceries; stale 2024 items are soft preferExclude
  (Review can swipe away).
adapter: shopping-history
input:
  locale: pl
  lists:
    - name: Stara 2024
      updatedAt: 2024-01-15T10:00:00.000Z
      items:
        - name: Konserwy wojskowe
          category: other
          amount: null
          note: null
        - name: Zapałki
          category: household
          amount: null
          note: null
    - name: Nowa A
      updatedAt: 2026-07-10T10:00:00.000Z
      items:
        - name: Mleko
          category: dairy
          amount: null
          note: null
        - name: Chleb
          category: bakery
          amount: null
          note: null
    - name: Nowa B
      updatedAt: 2026-07-12T10:00:00.000Z
      items:
        - name: Mleko
          category: dairy
          amount: null
          note: null
        - name: Jajka
          category: dairy
          amount: null
          note: null
    - name: Nowa C
      updatedAt: 2026-07-14T10:00:00.000Z
      items:
        - name: Chleb
          category: bakery
          amount: null
          note: null
        - name: Masło
          category: dairy
          amount: null
          note: null
    - name: Nowa D
      updatedAt: 2026-07-16T10:00:00.000Z
      items:
        - name: Jajka
          category: dairy
          amount: null
          note: null
        - name: Woda
          category: drinks
          amount: null
          note: null
expectations:
  mustIncludeAny:
    - Mleko
    - Chleb
  preferExclude:
    - Konserwy wojskowe
    - Zapałki
  nonEmpty: true
hardRules:
  - id: H001
    type: json_valid
  - id: H002
    type: category_enum
  - id: H004
    type: no_hallucination
  - id: H005
    type: language
    locale: pl
  - id: H006
    type: product_cap
    max: 40
softRules: []
infoRules:
  - id: I001
    type: merge_count
  - id: I002
    type: avg_note_length
  - id: I003
    type: avg_reason_length
  - id: I004
    type: item_count
