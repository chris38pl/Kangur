id: merge-existing-milk
scenarioVersion: 1
name: Existing Mleko merges with fixture ingredient
adapter: meal-proposal
input:
  locale: pl
  existingItems:
    - name: Mleko
      category: dairy
      amount: null
      note: null
      status: pending
  mealsFixture:
    meals:
      - mealId: owsianka
        title: Owsianka
        icon: "🥣"
        ingredients:
          - proposalRowId: o1
            name: Mleko
            amount: "1 l"
            note: null
            category: dairy
            confidence: 0.9
          - proposalRowId: o2
            name: Płatki owsiane
            amount: null
            note: null
            category: other
            confidence: 0.9
expectations:
  nonEmpty: true
  mustIncludeAny:
    - Mleko
hardRules:
  - id: H001
    type: json_valid
  - id: H002
    type: category_enum
  - id: H012
    type: non_empty_items
  - id: H014
    type: unique_item_names
  - id: H015
    type: meal_count
    min: 1
    max: 1
softRules: []
infoRules:
  - id: I001
    type: merge_count
  - id: I004
    type: item_count
