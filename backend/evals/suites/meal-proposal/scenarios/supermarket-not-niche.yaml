id: supermarket-not-niche
scenarioVersion: 1
name: Prefer Boczek / Parmezan over niche Italian terms
adapter: meal-proposal
input:
  locale: pl
  dishes:
    - Carbonara
expectations:
  nonEmpty: true
  mustIncludeAny:
    - Boczek
    - Parmezan
    - Ser
hardRules:
  - id: H001
    type: json_valid
  - id: H002
    type: category_enum
  - id: H012
    type: non_empty_items
  - id: H014
    type: unique_item_names
  - id: H015
    type: meal_count
    min: 1
    max: 2
softRules:
  - id: S007
    type: no_premium_terms
    patterns:
      - Guanciale
      - DOP
      - Parmigiano\s+Reggiano
infoRules:
  - id: I004
    type: item_count
