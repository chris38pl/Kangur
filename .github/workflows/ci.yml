name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm openapi:generate
      - name: OpenAPI drift check
        run: git diff --exit-code -- openapi/openapi.json
      - env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/kangur?sslmode=require
          DIRECT_URL: postgresql://user:pass@localhost:5432/kangur?sslmode=require
        run: pnpm exec prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/kangur?sslmode=require
          DIRECT_URL: postgresql://user:pass@localhost:5432/kangur?sslmode=require
        run: pnpm build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
